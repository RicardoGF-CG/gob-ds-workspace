<div class="context-menu">
  <button
    class="context-menu__trigger"
    type="button"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen"
    aria-haspopup="true"
  >
    <ng-content />
  </button>

  @if (isOpen) {
    <div class="context-menu__dropdown" [class.context-menu__dropdown--right]="align === 'right'" role="menu">
      @for (item of items; track item.label) {
        @if (item.divider) {
          <div class="context-menu__divider" role="separator"></div>
        } @else {
          <button
            class="context-menu__item"
            [class.context-menu__item--danger]="item.danger"
            [class.context-menu__item--disabled]="item.disabled"
            [disabled]="item.disabled"
            role="menuitem"
            type="button"
            (click)="onItemClick(item)"
          >
            @if (item.icon) {
              <lucide-icon [img]="item.icon" [size]="16" />
            }
            {{ item.label }}
          </button>
        }
      }
    </div>
  }
</div>
