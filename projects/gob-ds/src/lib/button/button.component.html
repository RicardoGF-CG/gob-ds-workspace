<ng-template #content>
    @if (loading) {
    <lucide-icon [img]="Loader2" [size]="iconSize" class="btn__spinner" />
    }

    @if (showIconLeft) {
    <lucide-icon [img]="icon" [size]="iconSize" class="btn__icon" />
    }

    @if (iconPosition !== 'only') {
    <span class="btn__label">
        <ng-content />
    </span>
    }

    @if (showIconOnly) {
    <lucide-icon [img]="icon" [size]="iconSize" class="btn__icon" />
    }

    @if (showIconRight) {
    <lucide-icon [img]="icon" [size]="iconSize" class="btn__icon" />
    }
</ng-template>

@if (asTag === 'a') {
<a [class]="hostClasses + ' ' + stateClasses" [attr.aria-disabled]="isDisabled">
    <ng-container *ngTemplateOutlet="content" />
</a>
} @else {
<button [class]="hostClasses + ' ' + stateClasses" [disabled]="isDisabled" [attr.aria-busy]="loading">
    <ng-container *ngTemplateOutlet="content" />
</button>
}
