<div class="datepicker-wrapper" [class]="'size-' + size">

    <!-- Label -->
    <label *ngIf="label" class="datepicker-label" [class.required]="required">
        {{ label }}
        <span *ngIf="required" class="required-star">*</span>
    </label>

    <!-- Input trigger -->
    <div class="datepicker-input" [class]="'state-' + state" [class.open]="isOpen"
        [class.disabled]="state === 'disabled'" (click)="toggleCalendar()">
        <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
        </span>

        <span class="input-text" [class.placeholder]="!selectedDate">
            {{ selectedDate ? formatDate(selectedDate) : placeholder }}
        </span>

        <span *ngIf="selectedDate && state !== 'disabled'" class="clear-btn" (click)="clearDate($event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </span>

        <span class="chevron-icon" [class.rotated]="isOpen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6 9 12 15 18 9" />
            </svg>
        </span>
    </div>

    <!-- Helper text -->
    <p *ngIf="helperText" class="helper-text" [class]="'helper-' + state">
        {{ helperText }}
    </p>

    <!-- Calendar dropdown -->
    <div class="calendar-dropdown" *ngIf="isOpen && state !== 'disabled'">

        <!-- Header -->
        <div class="calendar-header">
            <button class="nav-btn" (click)="prevMonth()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <div class="month-year">
                <span class="month-name">{{ monthNames[currentMonth] }}</span>
                <span class="year-name">{{ currentYear }}</span>
            </div>
            <button class="nav-btn" (click)="nextMonth()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </div>

        <!-- Day headers -->
        <div class="day-headers">
            <span *ngFor="let d of dayNames">{{ d }}</span>
        </div>

        <!-- Day grid -->
        <div class="day-grid">
            <button *ngFor="let day of calendarDays" class="day-cell" [class.other-month]="!day.currentMonth"
                [class.today]="day.isToday" [class.selected]="day.isSelected" [class.disabled]="day.isDisabled"
                [disabled]="day.isDisabled" (click)="selectDay(day)">
                {{ day.date.getDate() }}
            </button>
        </div>

        <!-- Footer -->
        <div class="calendar-footer">
            <button class="today-btn" (click)="selectToday()">Hoy</button>
        </div>

    </div>
</div>
